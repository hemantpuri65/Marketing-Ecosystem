        SPECIALIST: { bg: "#7c3aed", t: "#fff" },

                        <div style="font-size:11px; color:#888; margin-top:3px;">${c.checks}</div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }
    else if (state.view === 'backups') {
        content.innerHTML = `<div style="padding:20px;">
            <h2 style="font-size:18px; font-weight:800; margin:0 0 16px 0">Zero-Compromise Backups</h2>
            ${BACKUPS.map(b => `
                <div class="section-box" style="padding:12px; margin-bottom:8px">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
                        <span style="font-size:13px"><span style="color:#888">If </span><span style="font-weight:700; color:#F59E0B">${b.tool}</span><span style="color:#888"> disappears:</span></span>
                        <span class="badge" style="background:${b.vc}20; color:${b.vc};">BACKUP: ${b.verdict}</span>
                    </div>
                    <div style="font-size:12px; font-weight:600; margin-bottom:2px">→ ${b.backup}</div>
                    <div style="font-size:10px; color:#888">${b.detail}</div>
                </div>
            `).join('')}
            
            <div style="margin-top:16px; padding:14px; background-color:#0a2a1a; border:1px solid #16a34a30; border-radius:10px;">
                <div style="font-size:12px; font-weight:700; color:#4ECDC4; margin-bottom:4px;">THE PRINCIPLE</div>
                <div style="font-size:13px; line-height:1.5;">
                    <span style="font-weight:700; color:#F59E0B;">Speed boosters</span>, never <span style="font-weight:700; color:#ef4444;">foundations</span>. Core stable stack handles 100% of client work independently.
                </div>
            </div>
        </div>`;
    }
    else if (state.view === 'gemini') {
        content.innerHTML = `<div style="padding:20px;">
            <h2 style="font-size:18px; font-weight:800; margin:0 0 4px 0"><span style="color:#4285F4">●</span> Gemini 3.1 Pro Integration Map</h2>
            <p style="color:#777; font-size:12px; margin:0 0 16px 0">Every place Gemini 3.1 Pro adds value in your agency</p>
            
            ${GEMINI_MAP.map(section => `
                <div class="section-box" style="padding:14px; border-color:#4285F430; margin-bottom:8px">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
                        <span style="font-size:14px; font-weight:700">${section.area}</span>
                        <span class="badge" style="background:#4285F420; color:#4285F4">${section.role}</span>
                    </div>
                    ${section.items.map(item => `<div style="font-size:11px; color:#aaa; padding:3px 0 3px 16px; line-height:1.4; border-left:2px solid #4285F430; margin-bottom:2px">${item}</div>`).join('')}
                </div>
            `).join('')}

            <div style="margin-top:16px; padding:14px; background-color:#1a1a2e; border:1px solid #4285F430; border-radius:10px;">
                <div style="font-size:12px; font-weight:700; color:#4285F4; margin-bottom:6px;">CLAUDE vs GEMINI vs GROK: WHEN TO USE WHICH</div>
                <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
                    <div>
                        <div style="font-size:10px; font-weight:700; color:#E8B931; margin-bottom:4px;">CLAUDE (Primary)</div>
                        <div style="font-size:10px; color:#aaa; line-height:1.5;">All copywriting • All prompts • Strategy docs • Client proposals • Skills (.docx .pdf) • Artifacts • Campaign mgmt • Brand sheets</div>
                    </div>
                    <div>
                        <div style="font-size:10px; font-weight:700; color:#4285F4; margin-bottom:4px;">GEMINI (Support)</div>
                        <div style="font-size:10px; color:#aaa; line-height:1.5;">GEO testing • NotebookLM • Second opinions • Data analysis • Powers Antigravity • Powers Flow • Cross-check</div>
                    </div>
                    <div>
                        <div style="font-size:10px; font-weight:700; color:#1DA1F2; margin-bottom:4px;">GROK (Specialist)</div>
                        <div style="font-size:10px; color:#aaa; line-height:1.5;">X social listening • Trend detection • Brand sentiment on X • GEO testing (5th platform) • Never for production</div>
                    </div>
                </div>
            </div>
        </div>`;
    }
}

function setState(key, val) {
    state[key] = val;
    if (key === 'layer') state.expandedTool = null;
    render();
}

function toggleTool(id) {
    state.expandedTool = state.expandedTool === id ? null : id;
    render();
}

render();
</script>
</body>
</html>
